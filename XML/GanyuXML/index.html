<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganyu XML Bucket Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 10px 14px; display: flex; gap: 7px; align-items: center; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }

  .header-title { font-size: 13px; font-weight: 700; color: #a5b4fc; white-space: nowrap; letter-spacing: 0.02em; flex-shrink: 0; }

  #url-input { flex: 1; min-width: 180px; background: #0f1117; border: 1px solid #2d3148; border-radius: 7px; color: #e2e8f0; font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.2s; }
  #url-input:focus { border-color: #6366f1; }
  #url-input::placeholder { color: #4a5068; }

  .btn { background: #6366f1; border: none; border-radius: 7px; color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; padding: 8px 12px; transition: background 0.18s, transform 0.1s; white-space: nowrap; }
  .btn:hover { filter: brightness(1.15); }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { background: #1e2030 !important; color: #3a3f58 !important; cursor: not-allowed; transform: none; filter: none; }

  #btn-next { background: #0f9d6e; }
  #btn-load-all { background: #7c3aed; }
  #btn-range { background: #b45309; }
  #btn-range:hover { background: #d97706; }
  #btn-mode { background: #1e3a5f; color: #7dd3fc; }
  #btn-mode.active { background: #2a2010; color: #fbbf24; }
  #btn-txt { background: #1e2535; color: #a5b4fc; }
  #btn-clear { background: #1e1515; color: #f87171; }

  /* Range modal */
  #range-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; }
  #range-modal.open { display: flex; }
  .range-box { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 22px 24px; width: 300px; display: flex; flex-direction: column; gap: 14px; }
  .range-box h3 { font-size: 14px; color: #c7d2fe; }
  .range-row { display: flex; gap: 10px; align-items: center; }
  .range-row label { font-size: 12px; color: #6b7280; width: 45px; flex-shrink: 0; }
  .range-row input { flex: 1; background: #0f1117; border: 1px solid #2d3148; border-radius: 6px; color: #e2e8f0; font-size: 13px; padding: 7px 10px; outline: none; }
  .range-row input:focus { border-color: #6366f1; }
  .range-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .range-btns .btn { padding: 7px 14px; }
  #btn-range-cancel { background: #2d3148; color: #94a3b8; }

  /* Status / progress */
  #progress-bar { height: 2px; background: #6366f1; width: 0%; transition: width 0.25s; }
  #status { padding: 4px 14px; font-size: 12px; color: #6b7280; min-height: 20px; }
  #status.loading { color: #a5b4fc; }
  #status.error { color: #f87171; }
  #status.success { color: #34d399; }
  #status.warn { color: #fbbf24; }

  .stats-bar { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 5px 14px; font-size: 12px; color: #6b7280; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .stats-bar strong { color: #a5b4fc; font-weight: 600; }

  /* Loader overlay */
  #loader-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; align-items: center; justify-content: center; flex-direction: column; gap: 16px; pointer-events: all; }
  #loader-overlay.visible { display: flex; }
  .loader { position: relative; width: 2.8em; height: 2.8em; transform: rotate(165deg); }
  .loader:before, .loader:after { content: ""; position: absolute; top: 50%; left: 50%; display: block; width: 0.5em; height: 0.5em; border-radius: 0.25em; transform: translate(-50%,-50%); }
  .loader:before { animation: la 2s infinite; }
  .loader:after  { animation: lb 2s infinite; }
  @keyframes la {
    0%   { width:0.5em; box-shadow: 1em -0.5em rgba(225,20,98,.75), -1em 0.5em rgba(111,202,220,.75); }
    35%  { width:2.5em; box-shadow: 0 -0.5em rgba(225,20,98,.75), 0 0.5em rgba(111,202,220,.75); }
    70%  { width:0.5em; box-shadow: -1em -0.5em rgba(225,20,98,.75), 1em 0.5em rgba(111,202,220,.75); }
    100% { box-shadow: 1em -0.5em rgba(225,20,98,.75), -1em 0.5em rgba(111,202,220,.75); }
  }
  @keyframes lb {
    0%   { height:0.5em; box-shadow: 0.5em 1em rgba(61,184,143,.75), -0.5em -1em rgba(233,169,32,.75); }
    35%  { height:2.5em; box-shadow: 0.5em 0 rgba(61,184,143,.75), -0.5em 0 rgba(233,169,32,.75); }
    70%  { height:0.5em; box-shadow: 0.5em -1em rgba(61,184,143,.75), -0.5em 1em rgba(233,169,32,.75); }
    100% { box-shadow: 0.5em 1em rgba(61,184,143,.75), -0.5em -1em rgba(233,169,32,.75); }
  }
  #loader-label { font-size: 13px; color: #c7d2fe; background: rgba(15,17,23,0.92); padding: 5px 18px; border-radius: 20px; letter-spacing: 0.02em; }

  /* Output */
  #output { flex: 1; overflow-y: auto; }
  #output-inner { padding: 6px 14px 24px; }

  /* Virtual list container */
  #vlist-container { position: relative; }
  #vlist-content { position: absolute; top: 0; left: 0; right: 0; }

  .empty-state { text-align: center; padding: 60px 20px; color: #4a5068; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h2 { font-size: 16px; color: #6b7280; font-weight: 500; margin-bottom: 6px; }

  /* Link rows (virtual) */
  .vrow { display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #161820; padding: 3px 0; font-family: 'Consolas','Fira Mono',monospace; font-size: 12.5px; word-break: break-all; }
  .vrow a { color: #7dd3fc; text-decoration: none; flex: 1; }
  .vrow a:hover { color: #bae6fd; text-decoration: underline; }
  .vrow .meta { display: flex; gap: 6px; flex-shrink: 0; font-size: 11px; white-space: nowrap; }
  .vrow .date { color: #374151; }
  .vrow .size { color: #4a5568; }

  /* Folder tree */
  .folder-tree { font-family: 'Consolas','Fira Mono',monospace; font-size: 13px; padding: 4px 0; }
  .f-folder { }
  .f-folder-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; border-radius: 6px; cursor: pointer; color: #fbbf24; transition: background 0.1s; user-select: none; }
  .f-folder-row:hover { background: #1e2235; }
  .f-toggle { font-size: 9px; color: #4a5068; width: 12px; flex-shrink: 0; }
  .f-icon { flex-shrink: 0; }
  .f-name { flex: 1; }
  .f-count { font-size: 11px; color: #4a5068; }
  .f-children { margin-left: 18px; border-left: 1px solid #252840; padding-left: 8px; display: none; }
  .f-file { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 4px; color: #94a3b8; transition: background 0.1s; }
  .f-file:hover { background: #161820; color: #cbd5e1; }
  .f-file-name { flex: 1; word-break: break-all; font-size: 12px; }
  .f-file-meta { font-size: 10px; white-space: nowrap; display: flex; gap: 6px; flex-shrink: 0; }
  .f-date { color: #374151; }
  .f-size { color: #4a5568; }

  .single-page-note { background: #162113; border: 1px solid #2d4a22; border-radius: 8px; padding: 9px 13px; font-size: 12px; color: #86efac; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="loader-overlay">
  <div class="loader"></div>
  <div id="loader-label">Fetching…</div>
</div>

<div id="range-modal">
  <div class="range-box">
    <h3>📦 Page Range</h3>
    <div class="range-row"><label>Start</label><input type="number" id="range-start" min="1" value="1" placeholder="e.g. 100" /></div>
    <div class="range-row"><label>End</label><input type="number" id="range-end" min="1" placeholder="e.g. 200" /></div>
    <div style="font-size:11px;color:#4a5068;">Fetches pages from Start to End (inclusive).</div>
    <div class="range-btns">
      <button class="btn" id="btn-range-cancel" onclick="closeRange()">Cancel</button>
      <button class="btn" style="background:#b45309" onclick="startRange()">Go</button>
    </div>
  </div>
</div>

<header>
  <span class="header-title">Ganyu XML Bucket Browser</span>
  <input id="url-input" type="text" placeholder="https://your-bucket-cdn.example.com/" spellcheck="false" />
  <button class="btn" id="btn-fetch" onclick="startFetch()">Fetch</button>
  <button class="btn" id="btn-next" disabled onclick="doNextPage()">Next ›</button>
  <button class="btn" id="btn-load-all" disabled onclick="loadAll()">Load All</button>
  <button class="btn" id="btn-range" onclick="openRange()">⇥ Range</button>
  <button class="btn" id="btn-mode" onclick="toggleMode()">📁 Folder</button>
  <button class="btn" id="btn-txt" onclick="downloadTxt()">⬇ TXT</button>
  <button class="btn" id="btn-clear" onclick="clearAll()">✕</button>
</header>

<div id="progress-bar"></div>
<div id="status"></div>
<div class="stats-bar" id="stats-bar" style="display:none">
  Keys: <strong id="stat-count">0</strong> &nbsp;|&nbsp; Pages: <strong id="stat-pages">0</strong> &nbsp;|&nbsp; More: <strong id="stat-more">—</strong> &nbsp;|&nbsp; Bucket: <strong id="stat-bucket">—</strong>
</div>

<div id="output">
  <div id="output-inner">
    <div class="empty-state">
      <div class="icon">🪣</div>
      <h2>Enter a bucket URL above and click Fetch</h2>
      <p style="font-size:13px;margin-top:4px;">Supports XML S3-compatible bucket listings</p>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
let allEntries = [];   // {key, size, date}
let nextMarker = '';
let isTruncated = false;
let baseUrl = '';
let pageCount = 0;
let mode = 'link';
let singlePageDetected = false;
let stopFlag = false;

// Virtual list state
const ROW_H = 22;       // px per row (link mode)
let vlScrollHandler = null;

// Range state
let rangeMode = false;
let rangeStart = 1;
let rangeEnd = 1;

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function parseSize(b) {
  const n = parseInt(b); if (!b || isNaN(n)) return '';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1)+' KB';
  if (n < 1073741824) return (n/1048576).toFixed(1)+' MB';
  return (n/1073741824).toFixed(2)+' GB';
}
function fmtDate(s) { try { return s ? new Date(s).toISOString().slice(0,10) : ''; } catch { return ''; } }

function setStatus(msg, cls='') { const e=$('status'); e.textContent=msg; e.className=cls; }
function setProgress(p) { $('progress-bar').style.width=p+'%'; }
function setTitle(msg) { document.title = msg ? 'Ganyu — '+msg : 'Ganyu XML Bucket Browser'; }

function showLoader(label) { $('loader-overlay').classList.add('visible'); $('loader-label').textContent=label||'Fetching…'; }
function hideLoader() { $('loader-overlay').classList.remove('visible'); }

function updateStats() {
  $('stats-bar').style.display='flex';
  $('stat-count').textContent=allEntries.length.toLocaleString();
  $('stat-pages').textContent=pageCount;
  $('stat-more').textContent=(isTruncated&&!singlePageDetected)?'Yes':'No';
  $('btn-next').disabled=!isTruncated||singlePageDetected;
  $('btn-load-all').disabled=!isTruncated||singlePageDetected;
}
function setBusy(v) {
  $('btn-fetch').disabled=v; $('btn-range').disabled=v;
  if(v){$('btn-next').disabled=true;$('btn-load-all').disabled=true;}
  else updateStats();
}

// ── Network ──────────────────────────────────────────────────────────────────
async function doFetch(url) {
  try {
    const r = await fetch(url, {cache:'no-store'});
    if (!r.ok) throw 0;
    return await r.text();
  } catch {
    const r2 = await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(url), {cache:'no-store'});
    if (!r2.ok) throw new Error('Proxy failed: '+r2.status);
    return await r2.text();
  }
}

function parsePage(text) {
  const xml = new DOMParser().parseFromString(text,'application/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML parse error.');
  const nm = xml.querySelector('NextMarker');
  const newMarker = nm ? nm.textContent.trim() : '';
  const trunc = xml.querySelector('IsTruncated');
  const truncated = trunc && trunc.textContent.trim().toLowerCase()==='true';
  const bn = xml.querySelector('Name');
  if (bn) $('stat-bucket').textContent = bn.textContent.trim();
  const entries = [];
  xml.querySelectorAll('Contents').forEach(c=>{
    const k=c.querySelector('Key'), s=c.querySelector('Size'), d=c.querySelector('LastModified');
    if(k) entries.push({key:k.textContent.trim(), size:s?s.textContent.trim():'', date:d?d.textContent.trim():''});
  });
  return {entries, newMarker, truncated};
}

// ── Core fetch ───────────────────────────────────────────────────────────────
async function startFetch() {
  const rawUrl = $('url-input').value.trim();
  if (!rawUrl) { setStatus('Please enter a bucket URL.','error'); return; }
  baseUrl = rawUrl.split('?')[0];
  if (!baseUrl.endsWith('/')) baseUrl += '/';
  reset();
  await fetchOnePage();
}

function reset() {
  allEntries=[]; nextMarker=''; pageCount=0; isTruncated=false;
  singlePageDetected=false; stopFlag=false; rangeMode=false;
  clearOutput();
  $('stats-bar').style.display='none';
  setTitle('');
}

async function fetchOnePage() {
  const url = nextMarker ? baseUrl+'?marker='+encodeURIComponent(nextMarker) : baseUrl;
  setBusy(true); showLoader('Fetching page '+(pageCount+1)+'…');
  setStatus('Fetching…','loading'); setProgress(40);
  try {
    const text = await doFetch(url);
    const {entries,newMarker,truncated} = parsePage(text);
    if (pageCount>0 && (entries.length===0||(newMarker&&newMarker===nextMarker))) {
      singlePageDetected=true; isTruncated=false;
      showSinglePageNote();
      setStatus('Marker returned no new keys — single page only.','warn');
      updateStats(); return;
    }
    allEntries = allEntries.concat(entries);
    nextMarker=newMarker; isTruncated=truncated; pageCount++;
    setProgress(100); setTimeout(()=>setProgress(0),500);
    renderOutput(); updateStats();
    setStatus(`Loaded ${entries.length} keys (total: ${allEntries.length.toLocaleString()}). `+(isTruncated?'More available.':'All keys loaded.'),'success');
    setTitle('');
  } catch(e) {
    setProgress(0); setStatus('Error: '+e.message,'error');
  } finally { setBusy(false); hideLoader(); }
}

async function doNextPage() { await fetchOnePage(); }

// ── Load All ─────────────────────────────────────────────────────────────────
async function loadAll() {
  if (!isTruncated||singlePageDetected) return;
  stopFlag=false; setBusy(true);
  while (isTruncated&&!stopFlag&&!singlePageDetected) {
    const pg = pageCount+1;
    showLoader('Scanning buckets… '+pg.toLocaleString());
    setTitle('Scanning buckets… '+pg.toLocaleString());
    setStatus('Scanning buckets… page '+pg.toLocaleString()+' ('+allEntries.length.toLocaleString()+' keys so far)','loading');
    const url = baseUrl+'?marker='+encodeURIComponent(nextMarker);
    try {
      const text = await doFetch(url);
      const {entries,newMarker,truncated} = parsePage(text);
      if (entries.length===0||(newMarker&&newMarker===nextMarker)) {
        singlePageDetected=true; isTruncated=false; showSinglePageNote();
        setStatus('Reached end of available pages.','warn'); break;
      }
      allEntries = allEntries.concat(entries);
      nextMarker=newMarker; isTruncated=truncated; pageCount++;
      updateStats();
      // Defer render to avoid blocking
      await tick();
    } catch(e) { setStatus('Error: '+e.message,'error'); break; }
  }
  setBusy(false); hideLoader();
  renderOutput(); updateStats();
  setTitle('');
  if (!singlePageDetected) setStatus(`Done! ${allEntries.length.toLocaleString()} keys across ${pageCount} pages.`,'success');
}

// ── Range ────────────────────────────────────────────────────────────────────
function openRange() { $('range-modal').classList.add('open'); $('range-start').focus(); }
function closeRange() { $('range-modal').classList.remove('open'); }

async function startRange() {
  const rawUrl = $('url-input').value.trim();
  if (!rawUrl) { closeRange(); setStatus('Enter a bucket URL first.','error'); return; }
  const s = parseInt($('range-start').value)||1;
  const e = parseInt($('range-end').value)||s;
  if (e < s) { setStatus('End must be ≥ Start.','error'); return; }
  closeRange();
  baseUrl = rawUrl.split('?')[0];
  if (!baseUrl.endsWith('/')) baseUrl += '/';
  reset();
  rangeMode=true; rangeStart=s; rangeEnd=e;

  setBusy(true); stopFlag=false;

  // Skip to page `s` first (we need to fetch s-1 pages to get the right marker)
  // Page 1 = first fetch (no marker). Page N = fetch with marker from page N-1.
  // Strategy: fetch pages 1..s-1 silently (just grab markers), then collect s..e.

  let marker = '';
  // Phase 1: skip to page s
  if (s > 1) {
    for (let p = 1; p < s && !stopFlag; p++) {
      const pg = p;
      showLoader('Skipping to start… '+pg+'/'+(s-1));
      setTitle('Skipping to start… '+pg+'/'+(s-1));
      setStatus('Skipping pages… '+pg+'/'+(s-1),'loading');
      const url = marker ? baseUrl+'?marker='+encodeURIComponent(marker) : baseUrl;
      try {
        const text = await doFetch(url);
        const {entries,newMarker,truncated} = parsePage(text);
        if (!truncated||entries.length===0) {
          singlePageDetected=true;
          setStatus('Bucket has fewer than '+s+' pages.','warn');
          setBusy(false); hideLoader(); rangeMode=false; return;
        }
        marker = newMarker;
        await tick();
      } catch(err) { setStatus('Error: '+err.message,'error'); setBusy(false); hideLoader(); return; }
    }
  }

  // Phase 2: collect pages s..e
  nextMarker = marker;
  for (let p = s; p <= e && !stopFlag; p++) {
    showLoader('Scanning buckets… '+p+'/'+e);
    setTitle('Scanning buckets… '+p+'/'+e);
    setStatus('Scanning buckets… '+p+'/'+e,'loading');
    const url = nextMarker ? baseUrl+'?marker='+encodeURIComponent(nextMarker) : baseUrl;
    try {
      const text = await doFetch(url);
      const {entries,newMarker,truncated} = parsePage(text);
      if (entries.length===0) { setStatus('No more data at page '+p+'.','warn'); break; }
      allEntries = allEntries.concat(entries);
      nextMarker=newMarker; isTruncated=truncated; pageCount++;
      updateStats();
      if (!truncated) { isTruncated=false; break; }
      await tick();
    } catch(err) { setStatus('Error: '+err.message,'error'); break; }
  }

  setBusy(false); hideLoader(); rangeMode=false;
  renderOutput(); updateStats(); setTitle('');
  setStatus(`Range done! ${allEntries.length.toLocaleString()} keys from pages ${s}–${Math.min(pageCount+s-1,e)}.`,'success');
}

// ── Virtual List (link mode) ─────────────────────────────────────────────────
function renderOutput() {
  if (mode==='link') renderVirtualList();
  else renderFolders();
}

function clearOutput() {
  const out=$('output');
  // Remove scroll listener
  if (vlScrollHandler) { out.removeEventListener('scroll',vlScrollHandler); vlScrollHandler=null; }
  $('output-inner').innerHTML='';
}

function showSinglePageNote() {
  const inner=$('output-inner');
  if (!inner.querySelector('.single-page-note')) {
    const n=document.createElement('div');
    n.className='single-page-note';
    n.textContent='ℹ️ This bucket only exposes a single page of results — pagination is not available.';
    inner.prepend(n);
  }
}

function renderVirtualList() {
  const out=$('output');
  const savedNote = $('output-inner').querySelector('.single-page-note')?.cloneNode(true);
  // Remove old scroll listener
  if (vlScrollHandler) { out.removeEventListener('scroll',vlScrollHandler); vlScrollHandler=null; }

  const inner=$('output-inner');
  inner.innerHTML='';
  if (savedNote) inner.appendChild(savedNote);

  if (!allEntries.length) return;

  const total = allEntries.length;
  const totalH = total * ROW_H;

  const container = document.createElement('div');
  container.id='vlist-container';
  container.style.position='relative';
  container.style.height=totalH+'px';
  inner.appendChild(container);

  const content = document.createElement('div');
  content.id='vlist-content';
  content.style.position='absolute';
  content.style.left='0'; content.style.right='0'; content.style.top='0';
  container.appendChild(content);

  let lastStart=-1, lastEnd=-1;

  function paint() {
    const scrollTop = out.scrollTop;
    const viewH = out.clientHeight;
    const bufRows = 30;
    const start = Math.max(0, Math.floor(scrollTop/ROW_H) - bufRows);
    const end   = Math.min(total-1, Math.ceil((scrollTop+viewH)/ROW_H) + bufRows);
    if (start===lastStart && end===lastEnd) return;
    lastStart=start; lastEnd=end;

    content.style.top = (start*ROW_H)+'px';
    const frag = document.createDocumentFragment();
    for (let i=start; i<=end; i++) {
      const {key,size,date}=allEntries[i];
      const fullUrl=baseUrl+key;
      const d=fmtDate(date), s=parseSize(size);
      const row=document.createElement('div');
      row.className='vrow';
      row.innerHTML=`<a href="${esc(fullUrl)}" target="_blank" rel="noopener">${esc(fullUrl)}</a><span class="meta">${d?`<span class="date">${esc(d)}</span>`:''}${s?`<span class="size">${esc(s)}</span>`:''}</span>`;
      frag.appendChild(row);
    }
    content.innerHTML='';
    content.appendChild(frag);
  }

  paint();
  vlScrollHandler = () => requestAnimationFrame(paint);
  out.addEventListener('scroll', vlScrollHandler, {passive:true});
}

// ── Folder tree ───────────────────────────────────────────────────────────────
function renderFolders() {
  const out=$('output');
  if (vlScrollHandler) { out.removeEventListener('scroll',vlScrollHandler); vlScrollHandler=null; }
  const inner=$('output-inner');
  const savedNote=inner.querySelector('.single-page-note')?.cloneNode(true);
  inner.innerHTML='';
  if (savedNote) inner.appendChild(savedNote);
  if (!allEntries.length) return;

  // Build tree structure
  const root={__files:[]};
  allEntries.forEach(({key,size,date})=>{
    const parts=key.split('/');
    let node=root;
    for(let i=0;i<parts.length-1;i++){
      if(!parts[i]) continue;
      if(!node[parts[i]]) node[parts[i]]={__files:[]};
      node=node[parts[i]];
    }
    const fname=parts[parts.length-1];
    if(fname) node.__files.push({name:fname,size,date});
  });

  function countNode(n){
    let c=n.__files?n.__files.length:0;
    Object.keys(n).forEach(k=>{if(k!=='__files') c+=countNode(n[k]);});
    return c;
  }

  function buildTree(node,depth){
    const wrap=document.createElement('div');
    if(depth>0){wrap.className='f-children';}

    Object.keys(node).sort().forEach(k=>{
      if(k==='__files') return;
      const child=node[k];
      const count=countNode(child);
      const folderDiv=document.createElement('div');
      folderDiv.className='f-folder';

      const row=document.createElement('div');
      row.className='f-folder-row';
      row.innerHTML=`<span class="f-toggle">▶</span><span class="f-icon">📁</span><span class="f-name">${esc(k)}</span><span class="f-count">${count.toLocaleString()}</span>`;

      const children=buildTree(child,depth+1);

      row.addEventListener('click',()=>{
        const open=children.style.display==='block';
        children.style.display=open?'none':'block';
        row.querySelector('.f-toggle').textContent=open?'▶':'▼';
        row.querySelector('.f-icon').textContent=open?'📁':'📂';
      });

      folderDiv.appendChild(row);
      folderDiv.appendChild(children);
      wrap.appendChild(folderDiv);
    });

    if(node.__files){
      node.__files.forEach(({name,size,date})=>{
        const fd=document.createElement('div');
        fd.className='f-file';
        const s=parseSize(size),d=fmtDate(date);
        fd.innerHTML=`<span class="f-file-name">${esc(name)}</span><span class="f-file-meta">${d?`<span class="f-date">${esc(d)}</span>`:''}${s?`<span class="f-size">${esc(s)}</span>`:''}</span>`;
        wrap.appendChild(fd);
      });
    }
    return wrap;
  }

  const wrap=document.createElement('div');
  wrap.className='folder-tree';
  const rootEl=buildTree(root,0);
  rootEl.style.display='block';
  wrap.appendChild(rootEl);
  inner.appendChild(wrap);
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
function toggleMode(){
  mode=mode==='link'?'folder':'link';
  const btn=$('btn-mode');
  if(mode==='folder'){btn.textContent='🔗 Links';btn.classList.add('active');}
  else{btn.textContent='📁 Folder';btn.classList.remove('active');}
  renderOutput();
}

// ── TXT download ──────────────────────────────────────────────────────────────
function downloadTxt(){
  if(!allEntries.length){setStatus('Nothing to download yet.','error');return;}
  const blob=new Blob([allEntries.map(e=>baseUrl+e.key).join('\n')],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='bucket_'+baseUrl.replace(/https?:\/\//,'').replace(/[^a-zA-Z0-9._-]/g,'_').slice(0,40)+'.txt';
  a.click();
  setStatus('Downloaded '+allEntries.length.toLocaleString()+' links.','success');
}

// ── Clear ─────────────────────────────────────────────────────────────────────
function clearAll(){
  stopFlag=true;
  allEntries=[]; nextMarker=''; isTruncated=false; baseUrl=''; pageCount=0;
  singlePageDetected=false; rangeMode=false;
  clearOutput();
  $('output-inner').innerHTML='<div class="empty-state"><div class="icon">🪣</div><h2>Enter a bucket URL above and click Fetch</h2><p style="font-size:13px;margin-top:4px;">Supports XML S3-compatible bucket listings</p></div>';
  $('stats-bar').style.display='none';
  $('btn-next').disabled=true; $('btn-load-all').disabled=true;
  setStatus(''); setProgress(0); hideLoader(); setTitle('');
  if(mode==='folder') toggleMode();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function tick(){ return new Promise(r=>setTimeout(r,0)); }

// ── Events ────────────────────────────────────────────────────────────────────
$('url-input').addEventListener('keydown',e=>{ if(e.key==='Enter') startFetch(); });
$('range-start').addEventListener('keydown',e=>{ if(e.key==='Enter') $('range-end').focus(); });
$('range-end').addEventListener('keydown',e=>{ if(e.key==='Enter') startRange(); });
$('range-modal').addEventListener('click',e=>{ if(e.target===$('range-modal')) closeRange(); });
</script>
