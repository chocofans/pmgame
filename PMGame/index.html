<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Index of /</title>

  cursor.css

  <style>
    body {
      background: white;
      font-family: monospace;
      color: black;
      margin: 16px;
      cursor: none;
    }

    h1 {
      font-weight: normal;
    }

    a {
      color: blue;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    pre {
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<h1>Index of /</h1>
<hr>

<pre id="index"></pre>

<hr>

cursor.js

<script>
function formatDate(date) {
  return date.toLocaleString("en-GB", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).replace(",", "");
}

const formattedDate = formatDate(new Date());

const entries = [
  { name: "dev/", type: "dir" },
  { name: "dev2/", type: "dir" },

  { name: "apk/", type: "dir" },
  { name: "asset/", type: "dir" },
  { name: "asset_dev/", type: "dir" },
  { name: "asset_dev2/", type: "dir" },
  { name: "asset_dev_2/", type: "dir" },
  { name: "asset_dev_plan/", type: "dir" },
  { name: "asset_dev_pre/", type: "dir" },
  { name: "asset_intranet_test/", type: "dir" },
  { name: "asset_master/", type: "dir" },
  { name: "build_backup/", type: "dir" },
  { name: "ipa/", type: "dir" },
  { name: "itms-services/", type: "dir" },

  { name: "bilibili.html", type: "file", size: "164" },
  { name: "imsystem.json", type: "file", size: "3314" }
];

let html = '';
html += `../../</a>\n`;

entries.forEach(e => {
  const size = e.type === "dir" ? "-" : e.size;
  html += `${e.name}${e.name}</a>`;
  html += `\t${formattedDate}\t${size}\n`;
});

document.getElementById("index").innerHTML = html;
</script>

</body>
</html>
