<!DOCTYPE html>
<html lang="en" data-motyw="jasny">
<head>
<meta charset="UTF-8">
<title>Index of /</title>

<style>
:root{
  --tlo:#ffffff;
  --tekst:#000000;
  --link:#000000;
  --linia:#ccc;
  --mysz:rgba(0,0,0,.55);
  --mysz-linia:rgba(0,0,0,.85);
}

[data-motyw="ciemny"]{
  --tlo:#0b0f14;
  --tekst:#e6edf3;
  --link:#ffffff;
  --linia:#222;
  --mysz:rgba(255,255,255,.6);
  --mysz-linia:rgba(255,255,255,.9);
}

*,
*::before,
*::after{
  user-select:none;
  -webkit-user-select:none;
  cursor:none;
}

html,body{
  width:100%;
  height:100%;
}

body{
  margin:16px;
  background:var(--tlo);
  color:var(--tekst);
  font-family:monospace;
  transition:background .4s,color .4s;
  overflow:hidden;
}

h1{font-weight:normal;color:var(--tekst);animation:wejdz .35s ease both}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
pre{
  font-size:14px;
  line-height:1.45;
  position:relative;
  z-index:1;
  color:var(--tekst);
}
hr{
  border:none;
  border-top:1px solid var(--linia);
  margin:12px 0;
  animation:wejdz .3s ease both;
}

@keyframes wejdz{
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes wpis{
  from{opacity:0;transform:translateX(-6px)}
  to{opacity:1;transform:translateX(0)}
}

.wiersz{
  display:block;
  animation:wpis .22s ease both;
}

.zorza{
  position:fixed;
  inset:-40%;
  z-index:0;
  pointer-events:none;
  opacity:0;
  transition:opacity .8s ease;
}

.zorza-1,.zorza-2,.zorza-3{
  position:absolute;
  inset:0;
  pointer-events:none;
}

[data-motyw="jasny"] .zorza{opacity:1}

[data-motyw="jasny"] .zorza-1{
  filter:blur(28px);
  animation:band1 5s ease-in-out infinite;
}

[data-motyw="jasny"] .zorza-2{
  filter:blur(34px);
  animation:band2 7s ease-in-out infinite;
}

[data-motyw="jasny"] .zorza-3{
  filter:blur(40px);
  animation:band3 9s ease-in-out infinite;
}

[data-motyw="ciemny"] .zorza{opacity:1}

[data-motyw="ciemny"] .zorza-1{
  filter:blur(55px) saturate(1.4);
  animation:band1 6s ease-in-out infinite;
}

[data-motyw="ciemny"] .zorza-2{
  filter:blur(65px) saturate(1.3);
  animation:band2 9s ease-in-out infinite;
}

[data-motyw="ciemny"] .zorza-3{
  filter:blur(75px) saturate(1.5);
  animation:band3 12s ease-in-out infinite;
}

@keyframes plyn{
  0%{transform:translate(0,0)}
  50%{transform:translate(-6%,4%)}
  100%{transform:translate(0,0)}
}

@keyframes band1{
  0%{transform:translate(0%,0%) scaleX(1)}
  30%{transform:translate(-5%,3%) scaleX(1.08)}
  60%{transform:translate(4%,-2%) scaleX(.95)}
  100%{transform:translate(0%,0%) scaleX(1)}
}

@keyframes band2{
  0%{transform:translate(0%,0%) scaleX(1)}
  40%{transform:translate(6%,-4%) scaleX(.92)}
  70%{transform:translate(-3%,5%) scaleX(1.06)}
  100%{transform:translate(0%,0%) scaleX(1)}
}

@keyframes band3{
  0%{transform:translate(0%,0%)}
  35%{transform:translate(3%,6%)}
  65%{transform:translate(-5%,-3%)}
  100%{transform:translate(0%,0%)}
}

.pestka{
  position:fixed;
  top:14px;
  right:14px;
  width:36px;
  height:36px;
  display:grid;
  place-items:center;
  z-index:5;
}

.kula{
  width:22px;
  height:22px;
  border-radius:50%;
  background:transparent;
  box-shadow:none;
  border:1.5px solid rgba(0,0,0,.18);
  transition:border .4s,box-shadow .4s;
}

[data-motyw="ciemny"] .kula{
  background:transparent;
  box-shadow:none;
  border:1.5px solid rgba(255,255,255,.22);
}

.mycha{
  position:fixed;
  width:14px;
  height:14px;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  background:var(--mysz);
  border:1px solid var(--mysz-linia);
  backdrop-filter:blur(4px);
  box-shadow:0 0 10px var(--mysz);
  transform:translate(-50%,-50%) scale(.85);
  opacity:.22;
  transition:opacity .25s,transform .25s,background .25s,border .25s;
}

.mycha.cien{opacity:.14}

.mycha.zywa{
  opacity:.9;
  transform:translate(-50%,-50%) scale(1.35);
}

.krater{
  position:fixed;
  width:14px;
  height:14px;
  border:1px solid var(--mysz-linia);
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  animation:fala .8s forwards;
  pointer-events:none;
  z-index:9998;
}

@keyframes fala{
  to{
    transform:translate(-50%,-50%) scale(4);
    opacity:0;
  }
}

.naglowek{
  position:fixed;
  top:14px;
  right:58px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:5;
}

.loader{
  position:relative;
  width:2.5em;
  height:2.5em;
  transform:rotate(165deg) scale(0.7);
  display:none;
  flex-shrink:0;
}

.loader.widoczny{
  display:block;
}

.loader:before,.loader:after{
  content:"";
  position:absolute;
  top:50%;
  left:50%;
  display:block;
  width:0.5em;
  height:0.5em;
  border-radius:0.25em;
  transform:translate(-50%,-50%);
}

.loader:before{
  animation:before8 2s infinite;
}

.loader:after{
  animation:after6 2s infinite;
}

@keyframes before8{
  0%{width:0.5em;box-shadow:1em -0.5em rgba(225,20,98,.75),-1em 0.5em rgba(111,202,220,.75)}
  35%{width:2.5em;box-shadow:0 -0.5em rgba(225,20,98,.75),0 0.5em rgba(111,202,220,.75)}
  70%{width:0.5em;box-shadow:-1em -0.5em rgba(225,20,98,.75),1em 0.5em rgba(111,202,220,.75)}
  100%{box-shadow:1em -0.5em rgba(225,20,98,.75),-1em 0.5em rgba(111,202,220,.75)}
}

@keyframes after6{
  0%{height:0.5em;box-shadow:0.5em 1em rgba(61,184,143,.75),-0.5em -1em rgba(233,169,32,.75)}
  35%{height:2.5em;box-shadow:0.5em 0 rgba(61,184,143,.75),-0.5em 0 rgba(233,169,32,.75)}
  70%{height:0.5em;box-shadow:0.5em -1em rgba(61,184,143,.75),-0.5em 1em rgba(233,169,32,.75)}
  100%{box-shadow:0.5em 1em rgba(61,184,143,.75),-0.5em -1em rgba(233,169,32,.75)}
}
</style>
</head>

<body>

<div class="zorza"><div class="zorza-1"></div><div class="zorza-2"></div><div class="zorza-3"></div></div>

<div class="naglowek">
  <div class="loader" id="ladowanie"></div>
  <div class="pestka" id="sliwka">
    <div class="kula"></div>
  </div>
</div>

<h1>Index of /</h1>
<hr>
<pre id="spis"></pre>
<hr>

<script>
const rnd=(min,max)=>Math.random()*(max-min)+min

const korzen=document.documentElement
const zapis=localStorage.getItem("motyw")
if(zapis) korzen.setAttribute("data-motyw",zapis)

const esRefresh=performance.navigation
  ?performance.navigation.type===1
  :(()=>{const e=performance.getEntriesByType("navigation")[0];return e&&e.type==="reload"})()

let aPos=JSON.parse(localStorage.getItem("aPos")||"null")
if(!aPos||esRefresh){
  aPos={
    ang1:rnd(110,170),ang2:rnd(120,175),ang3:rnd(100,160),
    s1x:rnd(10,50),s1y:rnd(20,60),s1w:rnd(55,90),s1h:rnd(30,55),
    s2x:rnd(40,80),s2y:rnd(30,70),s2w:rnd(50,85),s2h:rnd(25,50),
    s3x:rnd(15,55),s3y:rnd(15,50),s3w:rnd(45,80),s3h:rnd(20,45),
    s4x:rnd(45,85),s4y:rnd(45,75),s4w:rnd(40,70),s4h:rnd(20,40),
    s5x:rnd(20,65),s5y:rnd(25,65),s5w:rnd(60,95),s5h:rnd(25,50),
    o1:rnd(.07,.13),o2:rnd(.05,.10),o3:rnd(.06,.12),o4:rnd(.05,.09),o5:rnd(.06,.11),
    d_ang1:rnd(100,165),d_ang2:rnd(115,170),d_ang3:rnd(95,155),
    d_s1x:rnd(55,90),d_s1y:rnd(10,45),d_s1w:rnd(50,85),d_s1h:rnd(35,60),
    d_s2x:rnd(5,45),d_s2y:rnd(50,80),d_s2w:rnd(55,88),d_s2h:rnd(28,52),
    d_s3x:rnd(60,95),d_s3y:rnd(40,70),d_s3w:rnd(42,78),d_s3h:rnd(22,48),
    d_s4x:rnd(10,40),d_s4y:rnd(15,50),d_s4w:rnd(38,68),d_s4h:rnd(22,42),
    d_o1:rnd(.18,.28),d_o2:rnd(.12,.20),d_o3:rnd(.15,.24),d_o4:rnd(.10,.18)
  }
  localStorage.setItem("aPos",JSON.stringify(aPos))
}

const z1=document.querySelector(".zorza-1")
const z2=document.querySelector(".zorza-2")
const z3=document.querySelector(".zorza-3")

const aplicarZorza=m=>{
  if(m==="ciemny"){
    z1.style.background=`
      linear-gradient(${aPos.d_ang1}deg,
        transparent 5%,
        rgba(60,0,90,${aPos.d_o1}) 28%,
        rgba(40,0,70,${(aPos.d_o1*.7).toFixed(2)}) 50%,
        transparent 72%),
      radial-gradient(ellipse ${aPos.d_s1w}% ${aPos.d_s1h}% at ${aPos.d_s1x}% ${aPos.d_s1y}%,
        rgba(70,0,100,${aPos.d_o2}),transparent 80%)`

    z2.style.background=`
      linear-gradient(${aPos.d_ang2}deg,
        transparent 0%,
        rgba(90,0,55,${aPos.d_o3}) 35%,
        rgba(70,0,40,${(aPos.d_o3*.65).toFixed(2)}) 58%,
        transparent 78%),
      radial-gradient(ellipse ${aPos.d_s2w}% ${aPos.d_s2h}% at ${aPos.d_s2x}% ${aPos.d_s2y}%,
        rgba(80,0,50,${aPos.d_o4}),transparent 75%)`

    z3.style.background=`
      linear-gradient(${aPos.d_ang3}deg,
        transparent 10%,
        rgba(50,0,75,${aPos.d_o1}) 40%,
        rgba(75,0,45,${(aPos.d_o1*.55).toFixed(2)}) 62%,
        transparent 82%),
      radial-gradient(ellipse ${aPos.d_s3w}% ${aPos.d_s3h}% at ${aPos.d_s3x}% ${aPos.d_s3y}%,
        rgba(60,0,85,${aPos.d_o2}),transparent 78%),
      radial-gradient(ellipse ${aPos.d_s4w}% ${aPos.d_s4h}% at ${aPos.d_s4x}% ${aPos.d_s4y}%,
        rgba(80,0,50,${(aPos.d_o4*.8).toFixed(2)}),transparent 80%)`
  }else{
    z1.style.background=`
      linear-gradient(${aPos.ang1}deg,
        transparent 5%,
        rgba(160,160,165,${aPos.o1}) 30%,
        rgba(150,150,158,${(aPos.o1*.7).toFixed(2)}) 50%,
        transparent 70%),
      radial-gradient(ellipse ${aPos.s1w}% ${aPos.s1h}% at ${aPos.s1x}% ${aPos.s1y}%,
        rgba(155,155,162,${aPos.o2}),transparent 80%)`

    z2.style.background=`
      linear-gradient(${aPos.ang2}deg,
        transparent 0%,
        rgba(165,165,170,${aPos.o3}) 38%,
        rgba(152,152,158,${(aPos.o3*.65).toFixed(2)}) 58%,
        transparent 78%),
      radial-gradient(ellipse ${aPos.s2w}% ${aPos.s2h}% at ${aPos.s2x}% ${aPos.s2y}%,
        rgba(158,158,164,${aPos.o4}),transparent 75%)`

    z3.style.background=`
      linear-gradient(${aPos.ang3}deg,
        transparent 10%,
        rgba(155,155,162,${aPos.o5}) 40%,
        rgba(145,145,152,${(aPos.o5*.6).toFixed(2)}) 60%,
        transparent 80%),
      radial-gradient(ellipse ${aPos.s3w}% ${aPos.s3h}% at ${aPos.s3x}% ${aPos.s3y}%,
        rgba(156,156,163,${aPos.o2}),transparent 78%),
      radial-gradient(ellipse ${aPos.s4w}% ${aPos.s4h}% at ${aPos.s4x}% ${aPos.s4y}%,
        rgba(150,150,157,${(aPos.o4*.8).toFixed(2)}),transparent 80%)`
  }
}

aplicarZorza(korzen.getAttribute("data-motyw"))


const kwiaty=[
  {p:"klbq-overseas/", d:"07 Apr 2026 09:36"},
  {p:"klbq-cn/",        d:"07 Apr 2026 09:21"},
  {p:"klbq-dev/",       d:"06 Apr 2026 22:48"}
]

const pliki=[
  // {n:"archive.7z", u:"https://onedrive.live.com/download?...", d:"07 Apr 2026 10:00"},
]

const SZER=34

const estKubel=p=>p.endsWith("/")

const pobierzOneDrive=url=>{
  return url
    .replace("1drv.ms","onedrive.live.com")
    .replace(/\?.*$/,"")
    +"?download=1"
}

const linkPobierz=(n,u)=>{
  const href=u.includes("1drv.ms")||u.includes("onedrive.live.com")
    ?pobierzOneDrive(u)
    :u
  return `<a href="${href}" download>${n}</a>`
}

const rady=[]

const linkGora='<a href="../">../</a>'
rady.push(linkGora+" ".repeat(Math.max(0,SZER-"../".length))+"-")

kwiaty.forEach(b=>{
  const link=`<a href="${b.p}">${b.p}</a>`
  const spaces=" ".repeat(Math.max(0,SZER-b.p.length))
  rady.push(link+spaces+"-    "+b.d)
})

pliki.forEach(f=>{
  const link=linkPobierz(f.n,f.u)
  const spaces=" ".repeat(Math.max(0,SZER-f.n.length))
  rady.push(link+spaces+"-    "+f.d)
})

const jagoda=rady.map((r,i)=>`<span class="wiersz" style="animation-delay:${i*55}ms">${r}\n</span>`).join("")


document.getElementById("spis").innerHTML=jagoda

document.getElementById("sliwka").onclick=()=>{
  const m=korzen.getAttribute("data-motyw")==="ciemny"?"jasny":"ciemny"
  korzen.setAttribute("data-motyw",m)
  localStorage.setItem("motyw",m)
  aplicarZorza(m)
}

const pokaz=show=>{
  document.getElementById("ladowanie").classList.toggle("widoczny",show)
}

document.querySelectorAll("#spis a").forEach(a=>{
  a.addEventListener("click",e=>{
    const href=a.getAttribute("href")
    if(href==="./") return
    pokaz(true)
  })
})

const ile=4,myszy=[],polo=[]
let ost={x:0,y:0,t:0},blask=0

for(let i=0;i<ile;i++){
  const m=document.createElement("div")
  m.className="mycha"+(i?" cien":"")
  document.body.appendChild(m)
  myszy.push(m)
  polo.push({x:0,y:0})
}

document.addEventListener("pointermove",e=>{
  const teraz=performance.now()
  const dx=e.clientX-ost.x
  const dy=e.clientY-ost.y
  const dt=teraz-ost.t||16
  const v=Math.hypot(dx,dy)/dt*1000
  if(v>1800) blask=teraz+3000
  ost={x:e.clientX,y:e.clientY,t:teraz}
  polo[0]={x:e.clientX,y:e.clientY}
})

function kwitnij(){
  for(let i=polo.length-1;i>0;i--){
    polo[i].x+=(polo[i-1].x-polo[i].x)*.45
    polo[i].y+=(polo[i-1].y-polo[i].y)*.45
  }
  const on=performance.now()<blask
  myszy.forEach((m,i)=>{
    m.style.left=polo[i].x+"px"
    m.style.top=polo[i].y+"px"
    m.classList.toggle("zywa",on)
  })
  requestAnimationFrame(kwitnij)
}
kwitnij()

document.addEventListener("pointerdown",e=>{
  const r=document.createElement("div")
  r.className="krater"
  r.style.left=e.clientX+"px"
  r.style.top=e.clientY+"px"
  document.body.appendChild(r)
  setTimeout(()=>r.remove(),800)
})
</script>

</body>
</html>
