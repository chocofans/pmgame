<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Index of /</title>

  <style>
    body {
      background: white;
      font-family: monospace;
      color: black;
      margin: 16px;
    }

    h1 {
      font-weight: normal;
    }

    a {
      color: blue;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    pre {
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<h1>Index of /</h1>
<hr>

<pre id="index"></pre>

<hr>

<script>
function formatDate(date) {
  return date.toLocaleString("en-GB", {
    day: "2-digit",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false
  }).replace(",", "");
}

const formattedDate = formatDate(new Date());

const entries = [
  { name: "klbq-overseas/", type: "dir" },
  { name: "klbq-cn/", type: "dir" },
  { name: "klbq-dev/", type: "dir" }
];

let html = '';
html += `<a href="../`;

entries.forEach(e => {
  html += `<a href="${e.name}</a>\t${formattedDate}\t-\n`;
});

document.getElementById("index").innerHTML = html;
</script>

</body>
</html>
