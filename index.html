<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Ganyu.pl</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  :root {
    --bg-opacity: 0.55;
  }

  body {
    margin: 0;
    height: 100vh;
    font-family: system-ui, sans-serif;
    background-image: url("https://static.wikitide.net/strinovawiki/0/01/Celestia_Pledge.png");
    background-size: cover;
    background-position: center;
    color: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Dark overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, var(--bg-opacity));
    transition: background 0.2s ease;
    z-index: 0;
  }

  /* Centered text */
  .center-text {
    z-index: 1;
    font-size: 2.5rem;
    letter-spacing: 1px;
    opacity: 0.8;
  }

  /* Controls container */
  .controls {
    position: fixed;
    top: 14px;
    right: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 2;
    opacity: 0.15;
    transition: opacity 0.2s ease;
  }

  .controls:hover {
    opacity: 0.85;
  }

  .controls input[type="range"] {
    width: 90px;
    height: 4px;
    cursor: pointer;
  }

  .label {
    font-size: 10px;
    opacity: 0.6;
    margin-bottom: -2px;
  }
</style>
</head>

<body>

<!-- Background Music -->
<audio id="bgm" loop preload="auto">
  <source src="https://cdn.discordapp.com/attachments/1484606215064391783/1489504073559572511/bg.mp3?ex=69d34b44&is=69d1f9c4&hm=e12cf0d796b8b397bfb32ed5b83fa7bf265fcf42ea30ae478b7e0427b67b28ae&" type="audio/mpeg">
</audio>

<!-- Center Text -->
<div class="center-text">wkrótce wyjdzie</div>

<!-- Controls -->
<div class="controls">
  <div class="label">VOL</div>
  <input id="volume" type="range" min="0" max="100" value="35">

  <div class="label">BG</div>
  <input id="opacity" type="range" min="10" max="90" value="55">
</div>

<script>
  const audio = document.getElementById("bgm");
  const volume = document.getElementById("volume");
  const opacity = document.getElementById("opacity");

  audio.volume = 0;

  let activated = false;

  // Unlock autoplay on first interaction
  document.addEventListener("click", () => {
    if (!activated) {
      activated = true;
      audio.play();

      const target = volume.value / 100;
      let fade = setInterval(() => {
        if (audio.volume < target) {
          audio.volume += 0.02;
        } else {
          audio.volume = target;
          clearInterval(fade);
        }
      }, 50);
    }
  }, { once: true });

  // Volume slider
  volume.addEventListener("input", () => {
    audio.volume = volume.value / 100;
  });

  // Background opacity slider
  opacity.addEventListener("input", () => {
    document.documentElement.style.setProperty(
      "--bg-opacity",
      opacity.value / 100
    );
  });
</script>

</body>
</html>
