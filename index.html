<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PMGame :: INTRA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #000, #0f172a);
      color: #e5e7eb;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px;
    }
    h1 {
      color: #38bdf8;
      letter-spacing: 1px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: rgba(15, 23, 42, 0.75);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(56, 189, 248, .3);
    }
    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }
    footer {
      margin-top: 40px;
      font-size: 12px;
      text-align: center;
      opacity: .6;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>PMGame :: INTRA</h1>
  <p>Private Module Game Panel — ganyu.pl</p>

  <div class="cards">
    <div class="card">
      <h3>PMGame Loader</h3>
      <p>Secure build launcher</p>
      <button>Download</button>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p>
        Auth Server: Online<br>
        Anti‑Detection: Active<br>
        Updates: Manual
      </p>
    </div>

    <div class="card">
      <h3>Internal Panel</h3>
      <button>Login</button>
    </div>
  </div>

  <footer>
    © 2026 PMGame — ganyu.pl · GitHub Pages
  </footer>
</div>

</body>
</html>
